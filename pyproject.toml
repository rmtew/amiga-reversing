[project]
name = "amiga-reversing2"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "machine68k",
    "pymupdf>=1.27.2",
]

[dependency-groups]
dev = [
    "mypy>=1.18",
    "pytest>=8",
    "ruff>=0.11",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "runtime_coverage: KB/runtime/assembler coverage-contract tests",
]

[tool.mypy]
python_version = "3.14"
strict = true
follow_imports = "skip"
files = [
    "amiga_disk/__init__.py",
    "amiga_disk/adf.py",
    "amiga_disk/kb.py",
    "disasm/__init__.py",
    "disasm/api.py",
