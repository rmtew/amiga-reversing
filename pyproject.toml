    "disasm/annotations.py",
    "disasm/ascii.py",
    "disasm/cli.py",
    "disasm/comments.py",
    "disasm/data_access.py",
    "disasm/data_render.py",
    "disasm/discovery.py",
    "disasm/decode.py",
    "disasm/emitter.py",
    "disasm/entities.py",
    "disasm/hardware_symbols.py",
